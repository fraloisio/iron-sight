<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Iron Sight</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Black+Ops+One&display=swap" rel="stylesheet">
<script src="config.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #000;
    /* ── BACKGROUND IMAGE ──────────────────────────
       background: url('your-image.jpg') center/cover no-repeat;
       ─────────────────────────────────────────── */
    width: 100vw; height: 100vh;
    overflow: hidden; cursor: none;
    font-family: 'Black Ops One', monospace;
  }
  #crosshair {
    position: fixed; pointer-events: none; z-index: 100;
    transform: translate(-50%, -50%); width: 44px; height: 44px;
  }
  #crosshair::before, #crosshair::after {
    content: ''; position: absolute; background: rgba(255,255,255,0.85);
  }
  #crosshair::before { width: 100%; height: 1px; top: 50%; }
  #crosshair::after  { height: 100%; width: 1px; left: 50%; }
  .ch-circle { position: absolute; inset: 10px; border-radius: 50%; border: 1px solid rgba(255,255,255,0.85); }
  .target {
    position: absolute; border-radius: 50%;
    transform: translate(-50%, -50%);
    pointer-events: all; cursor: none;
    animation: pop-in 0.18s ease-out forwards;
  }
  @keyframes pop-in {
    from { transform: translate(-50%, -50%) scale(0); }
    to   { transform: translate(-50%, -50%) scale(1); }
  }
  .target.dying { pointer-events: none; animation: pop-out 0.22s ease-in forwards; }
  @keyframes pop-out {
    from { transform: translate(-50%, -50%) scale(1); opacity: 1; }
    to   { transform: translate(-50%, -50%) scale(0); opacity: 0; }
  }
  .target.nudge { animation: nudge 0.12s ease-out; }
  @keyframes nudge {
    0%   { transform: translate(-50%, -50%) scale(1); }
    40%  { transform: translate(-50%, -50%) scale(1.08); }
    100% { transform: translate(-50%, -50%) scale(1); }
  }
  #hud {
    position: fixed; top: 14px; left: 0; right: 0;
    display: flex; justify-content: center; gap: 40px;
    z-index: 300; pointer-events: none;
    color: rgba(255,255,255,0.7); font-size: 16px; letter-spacing: 3px;
    font-family: 'Black Ops One', monospace;
  }
  #hud span b { color: #f0c000; font-weight: normal; }
  .screen {
    position: fixed; inset: 0; display: flex; flex-direction: column;
    align-items: center; justify-content: center; z-index: 400;
    background: rgba(0,0,0,0.88); color: #fff; gap: 28px;
  }
  .screen h1 { font-size: 96px; letter-spacing: 10px; font-weight: normal; opacity: 1; font-family: 'Black Ops One', monospace; }
  .screen p  { font-size: 16px; letter-spacing: 4px; opacity: 0.75; }
  .screen .end-stat { font-size: 28px; letter-spacing: 6px; opacity: 1; color: #fff; }
  .screen .end-stat span { color: #f0c000; }
  .screen button {
    background: none; border: 2px solid rgba(255,255,255,0.7);
    color: #fff; font-family: 'Black Ops One', monospace; font-size: 18px;
    letter-spacing: 6px; padding: 14px 40px; cursor: pointer; margin-top: 10px;
    transition: border-color 0.15s, color 0.15s, background 0.15s;
  }
  .screen button:hover { border-color: #f0c000; color: #f0c000; }
</style>
</head>
<body>
<div id="crosshair"><div class="ch-circle"></div></div>
<div id="hud">
  <span>SCORE&nbsp;<b id="h-score">0</b></span>
  <span>HITS&nbsp;<b id="h-hits">0</b></span>
  <span>MISSES&nbsp;<b id="h-misses">0</b></span>
  <span>TIME&nbsp;<b id="h-time">30</b></span>
</div>
<div class="screen" id="start-screen">
  <h1>IRON SIGHT</h1>
  <p>aim for the centre · pull the trigger</p>
  <button id="start-btn">START</button>
</div>
<div class="screen" id="end-screen" style="display:none">
  <h1>FIRE CEASE</h1>
  <p class="end-stat">SCORE &nbsp;<span id="end-score">0</span></p>
  <p class="end-stat">HITS &nbsp;<span id="end-hits">0</span> &nbsp;·&nbsp; MISSES &nbsp;<span id="end-misses">0</span></p>
  <p class="end-stat">ACCURACY &nbsp;<span id="end-acc">0</span>%</p>
  <button id="restart-btn">AGAIN</button>
</div>
<script>
const CFG = {
  duration:30, minOnScreen:1, maxOnScreen:2,
  minSize:70, maxSize:150, minLife:3500, maxLife:6000,
  spawnTick:1800, hitsToDestroy:3,
};

// ── EXPLOSION CANVAS ──────────────────────────────────
const expCvs = document.createElement('canvas');
expCvs.style.cssText = 'position:fixed;inset:0;pointer-events:none;z-index:200;';
document.body.appendChild(expCvs);
const expCtx = expCvs.getContext('2d');
function resizeExpCvs() { expCvs.width=window.innerWidth; expCvs.height=window.innerHeight; }
resizeExpCvs(); window.addEventListener('resize', resizeExpCvs);

let explosions = [];

class Explosion {
  constructor(x, y, isKill) {
    this.x=x; this.y=y; this.isKill=isKill;
    this.t=0;
    this.dur = isKill ? 0.72 : 0.30;
    this.maxR = isKill ? (85+Math.random()*45) : (26+Math.random()*14);
    const eCount = isKill ? 26 : 7;
    this.embers = Array.from({length:eCount}, () => {
      const a=Math.random()*Math.PI*2;
      const s=isKill ? (2+Math.random()*7) : (1+Math.random()*3);
      return { x, y, vx:Math.cos(a)*s, vy:Math.sin(a)*s-(isKill?1.5:0.4),
               size:isKill?(1.5+Math.random()*3):(1+Math.random()*1.4),
               life:0.4+Math.random()*0.5, maxLife:0.4+Math.random()*0.5,
               hue:20+Math.random()*35 };
    });
    this.smokes = isKill ? Array.from({length:7}, () => {
      const a=-Math.PI/2+(Math.random()-0.5)*2.2;
      const s=0.5+Math.random()*1.2;
      return { x:x+(Math.random()-0.5)*20, y:y+(Math.random()-0.5)*20,
               vx:Math.cos(a)*s, vy:Math.sin(a)*s-0.4,
               r:8+Math.random()*12, maxR:35+Math.random()*30,
               alpha:0.55+Math.random()*0.2,
               grey:135+Math.floor(Math.random()*65),
               delay:0.15+Math.random()*0.2 };
    }) : [];
  }

  draw(ctx, dt) {
    this.t += dt / this.dur;
    const t = Math.min(this.t, 1);
    const cx=this.x, cy=this.y;

    // Core fireball
    const r = this.maxR * (t < 0.5 ? t*2 : 1-(t-0.5)*0.4);

    if (t < 0.88 && r > 1) {
      // Outer glow during growth
      if (t < 0.55) {
        const gA = Math.max(0,(0.55-t)/0.55*0.3);
        const glow = ctx.createRadialGradient(cx,cy,0,cx,cy,r*1.7);
        glow.addColorStop(0, `rgba(255,130,20,${gA})`);
        glow.addColorStop(1, 'rgba(255,60,0,0)');
        ctx.fillStyle=glow;
        ctx.beginPath(); ctx.arc(cx,cy,r*1.7,0,Math.PI*2); ctx.fill();
      }

      // Main fireball
      const grad = ctx.createRadialGradient(cx,cy,0,cx,cy,r);
      if (t < 0.15) {
        const p=t/0.15;
        grad.addColorStop(0,   `rgba(255,255,${Math.floor(255*(1-p))},0.97)`);
        grad.addColorStop(0.35,`rgba(255,220,80,0.92)`);
        grad.addColorStop(0.7, `rgba(255,110,15,0.7)`);
        grad.addColorStop(1,   `rgba(200,50,0,0)`);
      } else if (t < 0.5) {
        const p=(t-0.15)/0.35;
        const wh=Math.floor(255*(1-p*0.75));
        grad.addColorStop(0,   `rgba(255,${wh},${Math.floor(wh*0.25)},0.96)`);
        grad.addColorStop(0.22,`rgba(255,175,25,0.93)`);
        grad.addColorStop(0.52,`rgba(255,85,8,0.87)`);
        grad.addColorStop(0.78,`rgba(160,35,0,0.6)`);
        grad.addColorStop(1,   `rgba(70,12,0,0)`);
      } else {
        const p=(t-0.5)/0.38;
        const al=Math.max(0,1-p*1.15);
        grad.addColorStop(0,   `rgba(195,75,10,${al})`);
        grad.addColorStop(0.4, `rgba(130,28,4,${al*0.85})`);
        grad.addColorStop(0.75,`rgba(75,12,2,${al*0.5})`);
        grad.addColorStop(1,   `rgba(35,6,0,0)`);
      }
      ctx.fillStyle=grad;
      ctx.beginPath(); ctx.arc(cx,cy,r,0,Math.PI*2); ctx.fill();

      // Lumpy perimeter blobs (matches sprite's irregular edge)
      if (t > 0.08 && t < 0.78 && r > 6) {
        const bc = this.isKill ? 10 : 5;
        for (let i=0; i<bc; i++) {
          const ba=i/bc*Math.PI*2 + t*2.8;
          const br=r*(0.68+0.38*Math.sin(i*2.1+t*7));
          const bx=cx+Math.cos(ba)*br, by=cy+Math.sin(ba)*br;
          const bs=r*(0.17+0.13*Math.cos(i*1.9+t*4.5));
          const bPhase=t<0.5?(t-0.08)/0.42:1-(t-0.5)/0.28;
          const bA=Math.max(0,bPhase*0.52);
          const bg=ctx.createRadialGradient(bx,by,0,bx,by,bs);
          if (t<0.5) {
            bg.addColorStop(0,`rgba(255,130,18,${bA})`);
            bg.addColorStop(1,`rgba(170,45,0,0)`);
          } else {
            bg.addColorStop(0,`rgba(115,28,4,${bA})`);
            bg.addColorStop(1,`rgba(55,8,0,0)`);
          }
          ctx.fillStyle=bg;
          ctx.beginPath(); ctx.arc(bx,by,bs,0,Math.PI*2); ctx.fill();
        }
      }
    }

    // Embers
    for (const e of this.embers) {
      if (e.life <= 0) continue;
      e.life-=dt; e.x+=e.vx; e.y+=e.vy; e.vy+=0.13; e.vx*=0.97;
      const ep=Math.max(0,e.life/e.maxLife);
      ctx.fillStyle=`hsla(${e.hue},100%,${40+Math.floor(ep*55)}%,${ep})`;
      ctx.beginPath(); ctx.arc(e.x,e.y,e.size*ep,0,Math.PI*2); ctx.fill();
    }

    // Smoke (kill only)
    for (const s of this.smokes) {
      if (this.t*this.dur < s.delay) continue;
      s.x+=s.vx; s.y+=s.vy; s.vy-=0.007; s.vx*=0.99;
      s.r=Math.min(s.maxR, s.r+0.45);
      const el=(this.t*this.dur)-s.delay;
      const sA=Math.max(0,s.alpha*(1-el/0.88));
      const sg=ctx.createRadialGradient(s.x,s.y,0,s.x,s.y,s.r);
      sg.addColorStop(0,  `rgba(${s.grey},${s.grey},${s.grey},${sA})`);
      sg.addColorStop(0.5,`rgba(${s.grey},${s.grey},${s.grey},${sA*0.4})`);
      sg.addColorStop(1,  `rgba(${s.grey},${s.grey},${s.grey},0)`);
      ctx.fillStyle=sg;
      ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,Math.PI*2); ctx.fill();
    }

    return this.t < 1;
  }
}

let lastExp=0;
(function loop(ts) {
  const dt=Math.min((ts-lastExp)/1000,0.05);
  lastExp=ts;
  expCtx.clearRect(0,0,expCvs.width,expCvs.height);
  explosions=explosions.filter(e=>e.draw(expCtx,dt));
  requestAnimationFrame(loop);
})(0);

function playExplosion(x,y,isKill) { explosions.push(new Explosion(x,y,isKill)); }

qqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqTEFNRTMuMTAwqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqq';
  const bin=atob(b64), bytes=new Uint8Array(bin.length);
  for(let i=0;i<bin.length;i++) bytes[i]=bin.charCodeAt(i);
  try { gunshotBuffer=await ac.decodeAudioData(bytes.buffer); }
  catch(e) { console.warn('Audio decode failed',e); }
})();

function playGunshot() {
  if(!gunshotBuffer) return;
  const src=ac.createBufferSource(), gain=ac.createGain();
  src.buffer=gunshotBuffer; gain.gain.value=1.0;
  src.connect(gain); gain.connect(ac.destination); src.start();
}
function playRicochet() {
  const n=ac.sampleRate*0.12, buf=ac.createBuffer(1,n,ac.sampleRate), d=buf.getChannelData(0);
  for(let i=0;i<n;i++) { const t=i/ac.sampleRate; d[i]=Math.sin(t*(2200-t*8000)*Math.PI*2)*Math.exp(-t*18)*0.4; }
  const src=ac.createBufferSource(), gain=ac.createGain();
  src.buffer=buf; gain.gain.value=0.6;
  src.connect(gain); gain.connect(ac.destination); src.start(ac.currentTime+0.04);
}
function playDestroy() {
  const n=ac.sampleRate*0.25, buf=ac.createBuffer(1,n,ac.sampleRate), d=buf.getChannelData(0);
  for(let i=0;i<n;i++) { const t=i/ac.sampleRate; d[i]=(Math.random()*2-1)*Math.exp(-t*15)*Math.sin(t*60*Math.PI*2)*0.8; }
  const src=ac.createBufferSource(), gain=ac.createGain();
  src.buffer=buf; gain.gain.value=1.4;
  src.connect(gain); gain.connect(ac.destination); src.start();
}
function playMiss() {
  const o=ac.createOscillator(), g=ac.createGain();
  o.type='sawtooth'; o.frequency.value=180;
  g.gain.setValueAtTime(0.07,ac.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+0.1);
  o.connect(g); g.connect(ac.destination); o.start(); o.stop(ac.currentTime+0.1);
}

// ── BULLSEYE ──────────────────────────────────────────
function bullseye(size,hp,maxHp) {
  const c=size/2, dmg=maxHp-hp;
  const rc=[
    dmg===0?'#c41200':dmg===1?'#8a2010':'#5a1008',
    dmg===0?'#ffffff':dmg===1?'#ccbbaa':'#887060',
    dmg===0?'#c41200':dmg===1?'#8a2010':'#5a1008',
    dmg===0?'#ffffff':dmg===1?'#ccbbaa':'#887060',
    dmg===0?'#f0c000':dmg===1?'#a08000':'#604800',
  ];
  const rings=[c,c*.8,c*.6,c*.4,c*.2].map((r,i)=>`<circle cx="${c}" cy="${c}" r="${r}" fill="${rc[i]}"/>`).join('');
  let cracks='';
  if(dmg>=1) cracks+=`<line x1="${c*.3}" y1="${c*.2}" x2="${c*1.1}" y2="${c*1.4}" stroke="rgba(0,0,0,0.7)" stroke-width="${size*.025}"/>
    <line x1="${c*.28}" y1="${c*.18}" x2="${c*.7}" y2="${c*.9}" stroke="rgba(0,0,0,0.4)" stroke-width="${size*.012}"/>`;
  if(dmg>=2) cracks+=`<line x1="${c*1.5}" y1="${c*.3}" x2="${c*.5}" y2="${c*1.6}" stroke="rgba(0,0,0,0.7)" stroke-width="${size*.022}"/>
    <line x1="${c*.1}" y1="${c*1.1}" x2="${c*1.3}" y2="${c*.8}" stroke="rgba(0,0,0,0.55)" stroke-width="${size*.015}"/>`;
  let holes='';
  if(dmg>=1) holes+=`<circle cx="${c*1.05}" cy="${c*.85}" r="${size*.04}" fill="rgba(0,0,0,0.9)"/>`;
  if(dmg>=2) holes+=`<circle cx="${c*.7}" cy="${c*1.25}" r="${size*.04}" fill="rgba(0,0,0,0.9)"/>`;
  const torn=dmg>=2?`<circle cx="${c}" cy="${c}" r="${c}" fill="none" stroke="rgba(0,0,0,0.35)" stroke-width="${size*.06}" stroke-dasharray="${size*.08} ${size*.04}"/>`:'';
  return `<svg width="${size}" height="${size}" xmlns="http://www.w3.org/2000/svg">${rings}${cracks}${holes}${torn}</svg>`;
}

// ── GAME STATE ────────────────────────────────────────
let score=0,hits=0,misses=0,timeLeft=CFG.duration;
let running=false,spawnTimer=null,tickTimer=null;
let targets=[],tid=0;

function spawnTarget() {
  if(!running||targets.length>=CFG.maxOnScreen) return;
  const size=CFG.minSize+Math.random()*(CFG.maxSize-CFG.minSize);
  const pad=size/2+10;
  const x=pad+Math.random()*(window.innerWidth-pad*2);
  const y=pad+44+Math.random()*(window.innerHeight-pad*2-44);
  const life=CFG.minLife+Math.random()*(CFG.maxLife-CFG.minLife);
  const id=++tid;
  const el=document.createElement('div');
  el.className='target';
  el.style.cssText=`width:${size}px;height:${size}px;left:${x}px;top:${y}px`;
  el.innerHTML=bullseye(size,CFG.hitsToDestroy,CFG.hitsToDestroy);
  document.body.appendChild(el);
  const autoRemove=setTimeout(()=>killTarget(id,false),life);
  targets.push({id,el,size,hp:CFG.hitsToDestroy,maxHp:CFG.hitsToDestroy,x,y,autoRemove});
}

function killTarget(id,wasHit) {
  const i=targets.findIndex(t=>t.id===id);
  if(i===-1) return;
  const {el,autoRemove,x,y}=targets[i];
  clearTimeout(autoRemove); targets.splice(i,1);
  if(wasHit) playExplosion(x,y,true);
  el.classList.add('dying'); setTimeout(()=>el.remove(),250);
}

function redrawTarget(t) {
  t.el.innerHTML=bullseye(t.size,t.hp,t.maxHp);
  t.el.classList.remove('nudge'); void t.el.offsetWidth; t.el.classList.add('nudge');
}

function shoot(x,y) {
  if(!running) return;
  ac.resume(); playGunshot();
  for(let i=targets.length-1;i>=0;i--) {
    const t=targets[i];
    const rect=t.el.getBoundingClientRect();
    const cx=rect.left+rect.width/2, cy=rect.top+rect.height/2;
    const dist=Math.hypot(x-cx,y-cy);
    if(dist<=rect.width/2) {
      const ratio=dist/(rect.width/2);
      score+=ratio<.2?50:ratio<.4?30:ratio<.6?20:ratio<.8?10:5;
      hits++; t.hp--;
      updateHUD();
      if(t.hp<=0) { playDestroy(); killTarget(t.id,true); }
      else { playRicochet(); playExplosion(x,y,false); redrawTarget(t); }
      return;
    }
  }
  misses++; playMiss(); playExplosion(x,y,false); updateHUD();
}

function updateHUD() {
  document.getElementById('h-score').textContent=score;
  document.getElementById('h-hits').textContent=hits;
  document.getElementById('h-misses').textContent=misses;
  document.getElementById('h-time').textContent=Math.ceil(timeLeft);
}

function startGame() {
  ac.resume(); score=0;hits=0;misses=0;timeLeft=CFG.duration;
  targets.forEach(t=>{clearTimeout(t.autoRemove);t.el.remove();});
  targets=[]; explosions=[];
  document.getElementById('start-screen').style.display='none';
  document.getElementById('end-screen').style.display='none';
  running=true; updateHUD();
  spawnTarget(); setTimeout(spawnTarget,600);
  spawnTimer=setInterval(()=>{
    const want=CFG.minOnScreen+Math.floor(Math.random()*(CFG.maxOnScreen-CFG.minOnScreen+1));
    while(targets.length<want) spawnTarget();
  },CFG.spawnTick);
  tickTimer=setInterval(()=>{
    timeLeft=Math.max(0,timeLeft-0.1); updateHUD();
    if(timeLeft<=0) endGame();
  },100);
}

function endGame() {
  clearInterval(spawnTimer); clearInterval(tickTimer);
  running=false;
  targets.forEach(t=>{clearTimeout(t.autoRemove);t.el.remove();});
  targets=[];
  const acc=hits+misses>0?Math.round(hits/(hits+misses)*100):0;
  document.getElementById('end-score').textContent=score;
  document.getElementById('end-hits').textContent=hits;
  document.getElementById('end-misses').textContent=misses;
  document.getElementById('end-acc').textContent=acc;
  document.getElementById('end-screen').style.display='flex';
}

let mx=window.innerWidth/2, my=window.innerHeight/2;
const ch=document.getElementById('crosshair');
document.addEventListener('mousemove',e=>{mx=e.clientX;my=e.clientY;ch.style.left=mx+'px';ch.style.top=my+'px';});
// ── IR TRACKER WEBSOCKET ─────────────────────────────
// Pi Zero W2 hotspot IP — always 192.168.4.1 when laptop connects to ironside network
const WS_URL = `ws://${CONFIG.piHost}:${CONFIG.wsPort}`;
let ws, wsRetryTimer;

function connectWS() {
  ws = new WebSocket(WS_URL);
  ws.onopen = () => {
    console.log('IR tracker connected');
    clearTimeout(wsRetryTimer);
  };
  ws.onmessage = e => {
    const d = JSON.parse(e.data);
    mx = d.x * window.innerWidth;
    my = d.y * window.innerHeight;
    ch.style.left = mx + 'px';
    ch.style.top  = my + 'px';
    if (d.shoot) {
      const startScreen = document.getElementById('start-screen');
      const endScreen   = document.getElementById('end-screen');
      if (startScreen.style.display !== 'none') { startGame(); }
      else if (endScreen.style.display !== 'none') { startGame(); }
      else { shoot(mx, my); }
    }
  };
  ws.onerror = () => console.warn('IR tracker not reachable — mouse fallback active');
  ws.onclose = () => {
    console.warn('IR tracker disconnected — retrying in 3s');
    wsRetryTimer = setTimeout(connectWS, 3000);
  };
}
connectWS();

document.addEventListener('click',e=>{if(running) shoot(e.clientX,e.clientY);});
document.addEventListener('keydown',e=>{if(e.code==='Space') shoot(mx,my);});
document.getElementById('start-btn').addEventListener('click',e=>{e.stopPropagation();startGame();});
document.getElementById('restart-btn').addEventListener('click',e=>{e.stopPropagation();startGame();});
</script>
